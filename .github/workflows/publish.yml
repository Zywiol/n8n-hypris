name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Git Safety and Cleanup
        run: |
          git config --global --add safe.directory "*"
          git config --global --add safe.directory /home/runner/work/n8n-hypris/n8n-hypris
          rm -rf n8n-official

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install --include=dev

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public --provenance --loglevel verbose
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
